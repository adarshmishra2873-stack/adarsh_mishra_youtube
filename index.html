<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM Play - Premium Video Platform</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--red:#FF0000;--dark:#0F0F0F;--card:#1A1A1A;--border:#2A2A2A;--text:#F1F1F1;--muted:#AAAAAA;--accent:#FF4444}
  body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh; overflow-x:hidden;}
  #app{display:flex;flex-direction:column;min-height:100vh}

  /* Topbar */
  .topbar{background:#0A0A0A;border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:center;gap:8px;text-decoration:none;cursor:pointer;}
  .logo-icon{background:var(--red);border-radius:6px;width:32px;height:24px;display:flex;align-items:center;justify-content:center}
  .logo-icon svg{width:14px;height:14px;fill:white}
  .logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
  .logo-sub{font-size:11px;color:var(--muted);margin-top:-2px}
  
  /* Search */
  .search-bar{flex:1;max-width:480px;margin:0 20px;display:flex}
  .search-bar input{flex:1;background:#1F1F1F;border:1px solid var(--border);border-right:none;border-radius:24px 0 0 24px;padding:8px 16px;color:var(--text);font-size:14px;outline:none}
  .search-bar input:focus{border-color:#555}
  .search-btn{background:#2A2A2A;border:1px solid var(--border);border-left:none;border-radius:0 24px 24px 0;padding:8px 16px;cursor:pointer;color:var(--muted)}
  .search-btn:hover{background:#333}
  
  /* User Profile */
  .topbar-right{display:flex;align-items:center;gap:12px}
  .user-badge{background:var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;font-weight:bold;}
  .user-badge img {width:100%; height:100%; object-fit:cover;}

  /* Layout */
  .main-layout{display:flex;flex:1}
  .sidebar{width:220px;background:#0A0A0A;border-right:1px solid var(--border);padding:16px 0;flex-shrink:0}
  .sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .2s;border-radius:0}
  .sidebar-item:hover,.sidebar-item.active{background:#1A1A1A;color:var(--text)}
  .sidebar-item.active{border-left:3px solid var(--red)}
  .sidebar-icon{font-size:16px;width:20px;text-align:center}
  .sidebar-section{font-size:11px;font-weight:600;color:#555;padding:12px 20px 4px;text-transform:uppercase;letter-spacing:.5px}

  .content{flex:1;overflow-y:auto;padding:20px}

  /* Hero & Categories */
  .hero-banner{background:linear-gradient(135deg,#1a0000,#2d0505,#1a0000);border:1px solid #3a0000;border-radius:12px;padding:28px 32px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
  .hero-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:var(--text)}
  .hero-title span{color:var(--red)}
  .hero-sub{font-size:14px;color:var(--muted);margin-top:4px}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .section-title{font-size:16px;font-weight:600;color:var(--text)}
  .category-pills{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .pill{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;white-space:nowrap}
  .pill:hover,.pill.active{background:var(--text);color:var(--dark);border-color:var(--text)}

  /* Video Grid */
  .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:32px}
  .video-card{background:var(--card);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;border:1px solid transparent}
  .video-card:hover{transform:translateY(-4px);border-color:#444}
  .thumb{position:relative;padding-top:56.25%;background:#222;overflow:hidden;border-radius:12px 12px 0 0;}
  .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .duration{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.85);color:#fff;font-size:12px;padding:3px 6px;border-radius:4px;font-weight:500}
  .video-info{padding:12px}
  .video-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .video-meta{font-size:12px;color:var(--muted)}
  .channel-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .channel-av{width:24px;height:24px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

  /* Channel Page UI */
  .channel-header-ui{display:flex;align-items:center;gap:20px;padding:30px;background:var(--card);border-radius:12px;margin-bottom:24px;border:1px solid var(--border)}
  .ch-big-av{width:80px;height:80px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700}
  .ch-big-name{font-size:24px;font-weight:600}

  /* --- Player Modal (Highly Optimized) --- */
  .player-modal{display:none;position:fixed;inset:0;background:var(--dark);z-index:1000;flex-direction:column}
  .player-modal.open{display:flex}
  .player-header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#0A0A0A;border-bottom:1px solid var(--border)}
  .close-btn{background:none;border:none;color:var(--text);cursor:pointer;font-size:18px;padding:4px 8px;border-radius:4px;font-weight:bold;}
  .close-btn:hover{background:#222;}
  
  .player-body{display:flex;flex:1;overflow:hidden;}
  .player-main{flex:1;display:flex;flex-direction:column;overflow-y:auto;}
  
  /* Proper 16:9 Iframe Wrapper */
  .iframe-wrap{position:relative;width:100%;padding-top:56.25%;background:#000; flex-shrink:0;}
  .iframe-wrap div, .iframe-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  
  .player-details{padding:20px;border-bottom:1px solid var(--border)}
  .player-vid-title{font-size:20px;font-weight:600;margin-bottom:12px;line-height:1.4}
  .player-stats{display:flex;align-items:center;gap:16px;flex-wrap:wrap; color:var(--muted); font-size:13px;}
  
  .action-btns{display:flex;gap:10px;margin-left:auto}
  .action-btn{background:#1F1F1F;border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background .2s; font-weight:500;}
  .action-btn:hover{background:#2A2A2A}
  .action-btn.liked{background:#FF000022;border-color:var(--red);color:var(--red)}
  
  .channel-info{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  .ch-avatar{width:48px;height:48px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0; cursor:pointer;}
  .ch-name{font-weight:600;font-size:15px; cursor:pointer;}
  .ch-name:hover{text-decoration:underline;}
  .ch-subs{font-size:12px;color:var(--muted)}
  .sub-btn{margin-left:auto;background:var(--text);color:var(--dark);border:none;padding:10px 20px;border-radius:20px;cursor:pointer;font-weight:600;font-size:14px;}
  .sub-btn.subbed{background:#333;color:var(--text)}
  
  .player-desc{padding:20px;font-size:14px;color:var(--muted);line-height:1.6; white-space:pre-wrap; background:#111; margin:20px; border-radius:10px;}
  
  /* Sidebar Queue */
  .sidebar-queue{width:350px;border-left:1px solid var(--border);overflow-y:auto;background:#0A0A0A; flex-shrink:0;}
  .queue-header{padding:16px;font-size:16px;font-weight:600;border-bottom:1px solid var(--border);position:sticky;top:0;background:#0A0A0A; z-index:10;}
  .queue-item{display:flex;gap:12px;padding:12px 16px;cursor:pointer;transition:background .2s;border-bottom:1px solid #1a1a1a;}
  .queue-item:hover{background:var(--card)}
  .queue-item.playing{background:#1a0000;border-left:3px solid var(--red);}
  .queue-thumb{width:120px;height:68px;border-radius:8px;background:#222;overflow:hidden;position:relative;flex-shrink:0}
  .queue-thumb img{width:100%;height:100%;object-fit:cover}
  .queue-info .qtitle{font-size:13px;font-weight:500;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; margin-bottom:4px;}
  .queue-info .qmeta{font-size:12px;color:var(--muted);}

  .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top:3px solid var(--red);border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Mobile Responsiveness Fix */
  @media(max-width:800px){
    .sidebar{display:none}
    .search-bar{max-width:200px}
    
    /* Player layout fix for mobile */
    .player-body{flex-direction:column; overflow-y:auto;}
    .player-main{flex:none; overflow-y:visible;}
    .sidebar-queue{width:100%; border-left:none; border-top:1px solid var(--border); overflow-y:visible;}
    .action-btns{margin-left:0; margin-top:15px; width:100%; justify-content:space-between;}
    .player-stats{flex-direction:column; align-items:flex-start;}
  }
</style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <a class="logo" onclick="showPage('home')">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div><div class="logo-text">AM Play</div><div class="logo-sub">by Adarsh Mishra</div></div>
    </a>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search videos or channels..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">&#128269;</button>
    </div>
    <div class="topbar-right">
      <div class="user-badge" title="Adarsh Mishra">
        <img src="profile.jpg" alt="Profile" onerror="this.style.display='none'; this.parentNode.innerText='AM'">
      </div>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-item active" onclick="showPage('home');setActive(this)"><span class="sidebar-icon">&#127968;</span> Home</div>
      <div class="sidebar-item" onclick="loadCategory('trending');setActive(this)"><span class="sidebar-icon">&#128293;</span> Trending</div>
      <div class="sidebar-section">Education & Categories</div>
      <div class="sidebar-item" onclick="loadCategory('education neet');setActive(this)"><span class="sidebar-icon">&#128218;</span> Education</div>
      <div class="sidebar-item" onclick="loadCategory('music');setActive(this)"><span class="sidebar-icon">&#127925;</span> Music</div>
      <div class="sidebar-item" onclick="loadCategory('technology');setActive(this)"><span class="sidebar-icon">&#128187;</span> Technology</div>
      <div class="sidebar-item" onclick="loadCategory('news');setActive(this)"><span class="sidebar-icon">&#128240;</span> News</div>
    </div>

    <div class="content" id="main-content">
      <div id="page-home"></div>
      <div id="page-search" style="display:none"></div>
      <div id="page-channel" style="display:none"></div> 
    </div>
  </div>
</div>

<div class="player-modal" id="player-modal">
  <div class="player-header">
    <button class="close-btn" onclick="closePlayer()">✕</button>
    <div style="flex:1; margin-left:10px; font-weight:500;">Now Playing</div>
    <select id="speed-control" class="action-btn" onchange="changeSpeed(this.value)" style="border:none; margin-right:10px;">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x Normal</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
        <option value="3">3x</option>
        <option value="4">4x Speed</option>
    </select>
  </div>
  
  <div class="player-body">
    <div class="player-main">
      <div class="iframe-wrap">
        <div id="yt-iframe"></div>
      </div>
      
      <div class="player-details">
        <div class="player-vid-title" id="player-vid-title">—</div>
        <div class="player-stats">
          <div><span id="player-views">—</span> • <span id="player-date">—</span></div>
          <div class="action-btns">
            <button class="action-btn" onclick="toggleLike()" id="like-btn">♡ Like</button>
            <button class="action-btn" onclick="shareVideo()">➦ Share</button>
            <button class="action-btn" onclick="openInYT()">🔗 YouTube</button>
          </div>
        </div>
      </div>
      
      <div class="channel-info">
        <div class="ch-avatar" id="ch-av"></div>
        <div>
            <div class="ch-name" id="ch-name-d">—</div>
            <div class="ch-subs">Official Channel</div>
        </div>
        <button class="sub-btn" id="sub-btn" onclick="toggleSub()">Subscribe</button>
      </div>
      
      <div class="player-desc" id="player-desc"></div>
    </div>
    
    <div class="sidebar-queue">
      <div class="queue-header">▶ Up Next</div>
      <div id="queue-list"></div>
    </div>
  </div>
</div>

<script>
// Load YouTube IFrame API
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
const firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

let ytPlayer;
const apiKey = 'AIzaSyBUxmcurJZITJ_iA4RRk6idNE3gwzpqby8'; 
let currentVideos = [];
let currentIdx = 0;
let likedVids = new Set();
let subbedChannels = new Set();

async function fetchYT(path){
  try {
    const r=await fetch(`https://www.googleapis.com/youtube/v3/${path}&key=${apiKey}`);
    return r.ok ? await r.json() : null;
  } catch { return null; }
}

function fmtViews(n){if(!n)return'';const x=parseInt(n);if(x>=1e9)return(x/1e9).toFixed(1)+'B views';if(x>=1e6)return(x/1e6).toFixed(1)+'M views';if(x>=1e3)return(x/1e3).toFixed(0)+'K views';return x+' views';}
function fmtDate(s){if(!s)return'';try{return new Date(s).toLocaleDateString('en-IN',{year:'numeric',month:'short',day:'numeric'});}catch{return s;}}
function fmtDur(s){if(!s)return'';const m=s.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);if(!m)return'';const h=m[1]?m[1]+':':'';const mi=m[2]?(m[2].padStart(h?2:1,'0'))+':':'0:';const sec=(m[3]||'0').padStart(2,'0');return h+mi+sec;}

function videoCard(v, idx){
  const vid = v.id?.videoId || v.id;
  const t = v.snippet;
  const dur = v.contentDetails ? fmtDur(v.contentDetails.duration) : '';
  const views = v.statistics ? fmtViews(v.statistics.viewCount) + ' • ' : '';
  return `
  <div class="video-card" onclick="openPlayer(${idx})">
    <div class="thumb">
      <img src="${t.thumbnails?.medium?.url || t.thumbnails?.default?.url}" loading="lazy">
      ${dur ? `<div class="duration">${dur}</div>` : ''}
    </div>
    <div class="video-info">
      <div class="video-title">${t.title}</div>
      <div class="channel-row">
        <div class="channel-av">${t.channelTitle ? t.channelTitle[0] : '?'}</div>
        <span>${t.channelTitle}</span>
      </div>
      <div class="video-meta">${views}${fmtDate(t.publishedAt)}</div>
    </div>
  </div>`;
}

function showPage(name){
  ['home','search','channel'].forEach(p => document.getElementById('page-'+p).style.display = p===name?'block':'none');
  if(name==='home' && document.getElementById('page-home').innerHTML === '') loadHome();
}

function setActive(el){
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}

async function loadHome(){
  const pg = document.getElementById('page-home');
  pg.innerHTML = `<div class="hero-banner">
    <div><div class="hero-title">AM <span>PLAY</span></div><div class="hero-sub">Adarsh Mishra's Premium Video Platform</div></div>
  </div>
  <div class="section-header"><div class="section-title">🔥 Trending Videos</div></div>
  <div style="text-align:center; padding:40px;"><div class="spinner"></div></div>`;
  
  const res = await fetchYT('videos?part=snippet,statistics,contentDetails&chart=mostPopular&regionCode=IN&maxResults=16');
  if(res && res.items) {
    currentVideos = res.items;
    pg.innerHTML = pg.innerHTML.replace('<div style="text-align:center; padding:40px;"><div class="spinner"></div></div>', `<div class="video-grid">${currentVideos.map((v,i)=>videoCard(v,i)).join('')}</div>`);
  }
}

async function doSearch(){
  const q = document.getElementById('search-input').value.trim();
  if(q) loadCategory(q);
}

async function loadCategory(cat){
  showPage('search');
  const pg = document.getElementById('page-search');
  pg.innerHTML = `<div class="section-header"><div class="section-title">Results: ${cat}</div></div>
  <div style="text-align:center; padding:40px;"><div class="spinner"></div></div>`;
  
  const d = await fetchYT(`search?part=snippet&q=${encodeURIComponent(cat)}&type=video&maxResults=16&regionCode=IN`);
  if(d && d.items){
      const ids = d.items.map(v=>v.id.videoId).join(',');
      const stats = await fetchYT(`videos?part=statistics,contentDetails&id=${ids}`);
      const statsMap = {};
      if(stats && stats.items) stats.items.forEach(s => statsMap[s.id] = s);
      currentVideos = d.items.map(v => ({...v, ...(statsMap[v.id.videoId] || {})}));
      pg.innerHTML = `<div class="section-header"><div class="section-title">Results: ${cat}</div></div>
      <div class="video-grid">${currentVideos.map((v,i)=>videoCard(v,i)).join('')}</div>`;
  }
}

async function openChannelView(channelId, channelTitle) {
    closePlayer();
    showPage('channel');
    const pg = document.getElementById('page-channel');
    pg.innerHTML = `<div style="text-align:center; padding:50px;"><div class="spinner"></div></div>`;
    
    const res = await fetchYT(`search?part=snippet&channelId=${channelId}&maxResults=16&order=date&type=video`);
    if(res && res.items) {
        const ids = res.items.map(v=>v.id.videoId).join(',');
        const stats = await fetchYT(`videos?part=statistics,contentDetails&id=${ids}`);
        const statsMap = {};
        if(stats && stats.items) stats.items.forEach(s => statsMap[s.id] = s);
        currentVideos = res.items.map(v => ({...v, ...(statsMap[v.id.videoId] || {})}));
        
        pg.innerHTML = `
            <div class="channel-header-ui">
                <div class="ch-big-av">${channelTitle[0]}</div>
                <div>
                    <div class="ch-big-name">${channelTitle}</div>
                    <div style="color:var(--muted); margin-top:5px;">Latest Videos</div>
                </div>
            </div>
            <div class="video-grid">${currentVideos.map((v,i)=>videoCard(v,i)).join('')}</div>
        `;
    }
}

function openPlayer(idx){
  currentIdx = parseInt(idx);
  const v = currentVideos[currentIdx];
  const vid = v.id?.videoId || v.id;
  const t = v.snippet;
  
  // Update Details
  document.getElementById('player-vid-title').innerText = t.title;
  document.getElementById('player-views').innerText = fmtViews(v.statistics?.viewCount);
  document.getElementById('player-date').innerText = fmtDate(t.publishedAt);
  document.getElementById('player-desc').innerText = t.description || 'No description available.';
  
  // Update Channel Link Info
  document.getElementById('ch-av').innerText = t.channelTitle ? t.channelTitle[0] : '';
  document.getElementById('ch-name-d').innerText = t.channelTitle || 'Unknown';
  
  document.getElementById('ch-av').onclick = () => openChannelView(t.channelId, t.channelTitle);
  document.getElementById('ch-name-d').onclick = () => openChannelView(t.channelId, t.channelTitle);

  // Like & Sub buttons update
  const likeBtn = document.getElementById('like-btn');
  likeBtn.innerText = likedVids.has(vid) ? '❤ Liked' : '♡ Like';
  likeBtn.className = likedVids.has(vid) ? 'action-btn liked' : 'action-btn';
  
  const subBtn = document.getElementById('sub-btn');
  subBtn.innerText = subbedChannels.has(t.channelTitle) ? 'Subscribed' : 'Subscribe';
  subBtn.className = subbedChannels.has(t.channelTitle) ? 'sub-btn subbed' : 'sub-btn';

  buildQueue();
  document.getElementById('player-modal').classList.add('open');

  const speedVal = parseFloat(document.getElementById('speed-control').value);

  // Load YouTube Video securely
  if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
      ytPlayer.loadVideoById(vid);
      ytPlayer.setPlaybackRate(speedVal);
  } else {
      ytPlayer = new YT.Player('yt-iframe', {
          height: '100%',
          width: '100%',
          videoId: vid,
          playerVars: { 
              'autoplay': 1, 
              'rel': 0, 
              'playsinline': 1, // Fixes mobile full-screen hijack
              'modestbranding': 1 
          },
          events: {
              'onReady': (event) => {
                  event.target.playVideo();
                  event.target.setPlaybackRate(speedVal);
              }
          }
      });
  }
}

function buildQueue(){
  document.getElementById('queue-list').innerHTML = currentVideos.map((v,i)=>{
    const t = v.snippet;
    return `
    <div class="queue-item ${i === currentIdx ? 'playing' : ''}" onclick="openPlayer(${i})">
      <div class="queue-thumb"><img src="${t.thumbnails?.medium?.url || t.thumbnails?.default?.url}"></div>
      <div class="queue-info">
        <div class="qtitle">${t.title}</div>
        <div class="qmeta">${t.channelTitle}</div>
      </div>
    </div>`;
  }).join('');
}

function changeSpeed(rate){ if(ytPlayer && ytPlayer.setPlaybackRate) ytPlayer.setPlaybackRate(parseFloat(rate)); }
function closePlayer(){ document.getElementById('player-modal').classList.remove('open'); if(ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo(); }
function openInYT(){ window.open('https://www.youtube.com/watch?v=' + (currentVideos[currentIdx].id?.videoId || currentVideos[currentIdx].id), '_blank'); }

function toggleLike(){
  const vid = currentVideos[currentIdx].id?.videoId || currentVideos[currentIdx].id;
  const btn = document.getElementById('like-btn');
  if(likedVids.has(vid)){ likedVids.delete(vid); btn.innerText = '♡ Like'; btn.className = 'action-btn'; }
  else { likedVids.add(vid); btn.innerText = '❤ Liked'; btn.className = 'action-btn liked'; }
}

function toggleSub(){
  const ch = currentVideos[currentIdx].snippet.channelTitle;
  const btn = document.getElementById('sub-btn');
  if(subbedChannels.has(ch)){ subbedChannels.delete(ch); btn.innerText = 'Subscribe'; btn.className = 'sub-btn'; }
  else { subbedChannels.add(ch); btn.innerText = 'Subscribed'; btn.className = 'sub-btn subbed'; }
}

function shareVideo(){
  const url = 'https://youtu.be/' + (currentVideos[currentIdx].id?.videoId || currentVideos[currentIdx].id);
  if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>alert('Link Copied!'));
  else prompt('Copy this link:', url);
}

loadHome();
