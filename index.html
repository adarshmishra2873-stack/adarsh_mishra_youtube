<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM PLAY PRO MAX</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
header{padding:10px;background:#111;display:flex;justify-content:space-between;}
.logo{color:red;font-size:20px;font-weight:bold;}

.reels{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.video{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.controls{
  position:absolute;
  right:10px;
  bottom:80px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

button{
  background:#111;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

.top-controls{
  position:absolute;
  top:10px;
  left:10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">AM PLAY MAX</div>
</header>

<div class="reels" id="reels"></div>

<script>

// ⚠️ NO DIRECT API KEY HERE (proxy use)
const API="https://yt.lemnoslife.com/noKey/videos?part=snippet&chart=mostPopular&maxResults=10&regionCode=IN";

let players=[];

async function load(){
  const res=await fetch(API);
  const data=await res.json();

  document.getElementById("reels").innerHTML=data.items.map((v,i)=>`
    <div class="video">
      
      <iframe src="https://www.youtube.com/embed/${v.id}?enablejsapi=1&playsinline=1"></iframe>

      <div class="controls">
        <button onclick="speed(${i},1)">1x</button>
        <button onclick="speed(${i},2)">2x</button>
        <button onclick="speed(${i},4)">4x⚡</button>
        <button onclick="earn()">💰</button>
      </div>

    </div>
  `).join("");

  initPlayers();
}

function initPlayers(){
  const iframes=document.querySelectorAll("iframe");
  iframes.forEach((frame,i)=>{
    players[i]=frame.contentWindow;
  });
}

// ⚡ SPEED CONTROL
function speed(i,rate){
  players[i].postMessage(JSON.stringify({
    event:"command",
    func:"setPlaybackRate",
    args:[rate]
  }),"*");
}

// 💰 EARNING SYSTEM
function earn(){
  window.open("https://www.amazon.in","_blank"); // affiliate replace karo
}

// 🎧 BACKGROUND PLAY
document.addEventListener("visibilitychange",()=>{
  if(document.hidden){
    players.forEach(p=>{
      p.postMessage(JSON.stringify({
        event:"command",
        func:"playVideo"
      }),"*");
    });
  }
});

// ⚡ FAST LOAD
load();

</script>

</body>
</html>
