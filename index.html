<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM Play - Adarsh Mishra</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--red:#FF0000;--dark:#0F0F0F;--card:#1A1A1A;--border:#2A2A2A;--text:#F1F1F1;--muted:#AAAAAA;--accent:#FF4444}
  body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
  #app{display:flex;flex-direction:column;min-height:100vh}

  .topbar{background:#0A0A0A;border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:center;gap:8px;text-decoration:none;cursor:pointer;}
  .logo-icon{background:var(--red);border-radius:6px;width:32px;height:24px;display:flex;align-items:center;justify-content:center}
  .logo-icon svg{width:14px;height:14px;fill:white}
  .logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
  .logo-sub{font-size:11px;color:var(--muted);margin-top:-2px}
  .search-bar{flex:1;max-width:480px;margin:0 20px;display:flex}
  .search-bar input{flex:1;background:#1F1F1F;border:1px solid var(--border);border-right:none;border-radius:24px 0 0 24px;padding:8px 16px;color:var(--text);font-size:14px;outline:none}
  .search-bar input:focus{border-color:#555}
  .search-btn{background:#2A2A2A;border:1px solid var(--border);border-left:none;border-radius:0 24px 24px 0;padding:8px 16px;cursor:pointer;color:var(--muted)}
  .search-btn:hover{background:#333}
  
  .user-badge{background:var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;}
  .user-badge img {width:100%; height:100%; object-fit:cover;}

  .main-layout{display:flex;flex:1}
  .sidebar{width:220px;background:#0A0A0A;border-right:1px solid var(--border);padding:16px 0;flex-shrink:0}
  .sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .2s}
  .sidebar-item:hover,.sidebar-item.active{background:#1A1A1A;color:var(--text)}
  .sidebar-item.active{border-left:3px solid var(--red)}
  .sidebar-icon{font-size:16px;width:20px;text-align:center}

  .content{flex:1;overflow-y:auto;padding:20px}

  .hero-banner{background:linear-gradient(135deg,#1a0000,#2d0505,#1a0000);border:1px solid #3a0000;border-radius:12px;padding:28px 32px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
  .hero-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:var(--text)}
  .hero-title span{color:var(--red)}

  .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:32px}
  .video-card{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s;border:1px solid var(--border)}
  .video-card:hover{transform:translateY(-3px);border-color:#444}
  .thumb{position:relative;padding-top:56.25%;background:#222}
  .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;padding:2px 5px;border-radius:4px}
  .video-info{padding:12px}
  .video-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  .player-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;flex-direction:column}
  .player-modal.open{display:flex}
  .player-header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#0A0A0A;border-bottom:1px solid var(--border)}
  .iframe-wrap{position:relative;padding-top:56.25%;background:#000}
  .iframe-wrap div{position:absolute;inset:0;width:100%;height:100%}
  
  .channel-header-ui{display:flex;align-items:center;gap:20px;padding:30px;background:var(--card);border-radius:12px;margin-bottom:24px;border:1px solid var(--border)}
  .ch-big-av{width:80px;height:80px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700}
  .ch-big-name{font-size:24px;font-weight:600}

  .action-btn{background:#1F1F1F;border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px}
  .sub-btn{background:var(--text);color:var(--dark);border:none;padding:8px 18px;border-radius:20px;cursor:pointer;font-weight:600}
  
  .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top:3px solid var(--red);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <a class="logo" onclick="showPage('home')">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div><div class="logo-text">AM Play</div><div class="logo-sub">by Adarsh Mishra</div></div>
    </a>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search videos or channels..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()">&#128269;</button>
    </div>
    <div class="topbar-right">
      <div class="user-badge"><img src="profile.jpg" onerror="this.parentNode.innerText='AM'"></div>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-item active" onclick="showPage('home');setActive(this)"><span class="sidebar-icon">&#127968;</span> Home</div>
      <div class="sidebar-item" onclick="showPage('trending');setActive(this)"><span class="sidebar-icon">&#128293;</span> Trending</div>
      <div class="sidebar-section" style="padding:15px 20px; font-size:11px; color:#555;">CATEGORIES</div>
      <div class="sidebar-item" onclick="loadCategory('music')">Music</div>
      <div class="sidebar-item" onclick="loadCategory('gaming')">Gaming</div>
      <div class="sidebar-item" onclick="loadCategory('tech')">Tech</div>
    </div>

    <div class="content">
      <div id="page-home"></div>
      <div id="page-trending" style="display:none"></div>
      <div id="page-search" style="display:none"></div>
      <div id="page-channel" style="display:none"></div> </div>
  </div>
</div>

<div class="player-modal" id="player-modal">
  <div class="player-header">
    <button class="action-btn" onclick="closePlayer()">✕ Close</button>
    <div id="modal-title-bar" style="flex:1; margin-left:15px; font-weight:500;">Video Player</div>
    <select id="speed-control" class="action-btn" onchange="changeSpeed(this.value)">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x Normal</option>
        <option value="2">2x</option>
        <option value="4">4x Speed</option>
    </select>
  </div>
  <div class="player-body" style="display:flex; flex:1; overflow:hidden;">
    <div style="flex:1; overflow-y:auto; padding:20px;">
      <div class="iframe-wrap"><div id="yt-iframe"></div></div>
      <h2 id="player-vid-title" style="margin-top:15px;">Video Title</h2>
      <div id="channel-info-block" style="display:flex; align-items:center; gap:12px; margin-top:20px; padding:15px; background:#111; border-radius:10px;">
          <div id="ch-av" class="user-badge" style="width:45px; height:45px;"></div>
          <div id="ch-name-d" style="font-weight:600; cursor:pointer;">Channel Name</div>
          <button class="sub-btn" style="margin-left:auto;">Subscribe</button>
      </div>
      <p id="player-desc" style="margin-top:20px; color:var(--muted); font-size:14px; line-height:1.6;"></p>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const apiKey = 'AIzaSyBUxmcurJZITJ_iA4RRk6idNE3gwzpqby8'; 
let ytPlayer;
let currentVideos = [];

async function fetchYT(path){
  const r=await fetch(`https://www.googleapis.com/youtube/v3/${path}&key=${apiKey}`);
  return r.ok ? await r.json() : null;
}

function videoCard(v, idx){
  const t = v.snippet;
  return `<div class="video-card" onclick="openPlayer(${idx})">
    <div class="thumb"><img src="${t.thumbnails.medium.url}"></div>
    <div class="video-info">
      <div class="video-title">${t.title}</div>
      <div style="font-size:11px; color:var(--muted);">${t.channelTitle}</div>
    </div>
  </div>`;
}

async function showPage(name){
  ['home','trending','search','channel'].forEach(p => document.getElementById('page-'+p).style.display = p===name?'block':'none');
  if(name==='home') loadHome();
}

async function loadHome(){
  const res = await fetchYT('videos?part=snippet,statistics&chart=mostPopular&regionCode=IN&maxResults=12');
  if(res) {
    currentVideos = res.items;
    document.getElementById('page-home').innerHTML = `<div class="video-grid">${currentVideos.map((v,i)=>videoCard(v,i)).join('')}</div>`;
  }
}

async function openChannelView(channelId, channelTitle) {
    closePlayer();
    showPage('channel');
    const pg = document.getElementById('page-channel');
    pg.innerHTML = `<div style="text-align:center; padding:50px;"><div class="spinner"></div></div>`;
    
    const res = await fetchYT(`search?part=snippet&channelId=${channelId}&maxResults=15&order=date&type=video`);
    if(res) {
        currentVideos = res.items;
        pg.innerHTML = `
            <div class="channel-header-ui">
                <div class="ch-big-av">${channelTitle[0]}</div>
                <div>
                    <div class="ch-big-name">${channelTitle}</div>
                    <div style="color:var(--muted);">Official Channel Feed</div>
                </div>
            </div>
            <div class="video-grid">${currentVideos.map((v,i)=>videoCard(v,i)).join('')}</div>
        `;
    }
}

function openPlayer(idx){
  const v = currentVideos[idx];
  const vid = v.id.videoId || v.id;
  const t = v.snippet;
  
  document.getElementById('player-vid-title').innerText = t.title;
  document.getElementById('player-desc').innerText = t.description;
  
  // Channel Click logic - Ab website par hi khulega
  document.getElementById('ch-av').innerText = t.channelTitle[0];
  const chNameDiv = document.getElementById('ch-name-d');
  chNameDiv.innerText = t.channelTitle;
  chNameDiv.onclick = () => openChannelView(t.channelId, t.channelTitle);

  document.getElementById('player-modal').classList.add('open');
  if(ytPlayer) ytPlayer.loadVideoById(vid);
  else ytPlayer = new YT.Player('yt-iframe', { videoId: vid, playerVars: {autoplay:1} });
}

function changeSpeed(rate){ if(ytPlayer) ytPlayer.setPlaybackRate(parseFloat(rate)); }
function closePlayer(){ document.getElementById('player-modal').classList.remove('open'); if(ytPlayer) ytPlayer.stopVideo(); }
function doSearch(){ loadCategory(document.getElementById('search-input').value); }
async function loadCategory(q){
    showPage('search');
    const res = await fetchYT(`search?part=snippet&q=${q}&type=video&maxResults=12`);
    if(res) { currentVideos = res.items; document.getElementById('page-search').innerHTML = `<div class="video-grid">${currentVideos.map((v,i)=>videoCard(v,i)).join('')}</div>`; }
}
function setActive(el){ document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }

loadHome();
</script>
</body>
</html>
